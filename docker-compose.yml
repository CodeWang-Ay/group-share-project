# =============================================================================
# 研究生组会管理系统 - Docker Compose 配置
# =============================================================================
# 使用方式：
#   开发环境：docker-compose up -d
#   生产环境：docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # 主应用服务
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: group-share-app
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      # 数据持久化：数据库
      - ./backend/database:/app/backend/database
      # 数据持久化：上传文件
      - ./uploads:/app/uploads
      # 日志持久化
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # 可选：Nginx 反向代理（生产环境推荐）
  # ---------------------------------------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: group-share-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app

# =============================================================================
# 数据卷配置
# =============================================================================
volumes:
  database-data:
  upload-data:

# =============================================================================
# 网络配置
# =============================================================================
networks:
  default:
    name: group-share-network