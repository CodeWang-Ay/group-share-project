<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }
        .icon {
            width: 80px;
            height: 80px;
            background-color: #6a76f0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }
        .icon img {
            width: 40px;
            height: 40px;
            filter: invert(1); /* 让图标变为白色 */
        }
        h2 {
            color: #6a76f0;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            width: 48%;
        }
        .login-btn {
            background-color: #6a76f0;
        }
        .register-btn {
            background-color: #fff;
            color: #6a76f0;
            border: 1px solid #6a76f0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="icon">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><polyline points='14 2 14 8 20 8'/><line x1='16' y1='13' x2='8' y2='13'/><line x1='16' y1='17' x2='8' y2='17'/></svg>" alt="图标">
        </div>
        <h2>用户登录</h2>
        <div class="input-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>
        <div class="input-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <div class="button-group">
            <button class="login-btn">登录</button>
            <button class="register-btn">注册新账号</button>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否已经登录 - 简化版本，让后端处理重定向
            const sessionToken = localStorage.getItem('session_token');
            if (sessionToken) {
                // 验证会话是否有效
                fetch('http://localhost:8081/api/auth/session-status', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${sessionToken}`
                    }
                })
                .then(response => response.json())
                .then(result => {
                    if (result.success && result.data.authenticated) {
                        // 已登录且会话有效，直接跳转到后端主页
                        window.location.href = `http://localhost:8081/?session_token=${sessionToken}`;
                        return;
                    }
                    // 会话无效，清除本地存储
                    localStorage.removeItem('session_token');
                    localStorage.removeItem('user_info');
                })
                .catch(error => {
                    console.error('检查会话状态失败:', error);
                    // 清除可能无效的本地存储
                    localStorage.removeItem('session_token');
                    localStorage.removeItem('user_info');
                });
            }

            // 获取DOM元素
            const loginBtn = document.querySelector('.login-btn');
            const registerBtn = document.querySelector('.register-btn');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');

            // 登录按钮点击事件
            loginBtn.addEventListener('click', async function() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                // 表单验证
                if (!username) {
                    showMessage('请输入用户名', 'error');
                    return;
                }

                if (!password) {
                    showMessage('请输入密码', 'error');
                    return;
                }

                // 禁用登录按钮，防止重复提交
                loginBtn.disabled = true;
                loginBtn.textContent = '登录中...';

                try {
                    // 发送登录请求到后端API
                    const response = await fetch('http://localhost:8081/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: username,
                            password: password
                        }),
                        redirect: 'follow'  // 允许重定向
                    });

                    // 检查响应状态
                    if (response.redirected) {
                        // 如果后端返回重定向，则跟随重定向
                        window.location.href = response.url;
                        return;
                    }

                    // 如果没有重定向，解析JSON响应（用于错误处理）
                    const result = await response.json();

                    if (!result.success) {
                        // 登录失败，显示错误消息
                        showMessage(result.message || '登录失败', 'error');
                    }
                } catch (error) {
                    console.error('登录请求失败:', error);
                    showMessage('网络错误，请稍后重试', 'error');
                } finally {
                    // 恢复登录按钮状态
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            });

            // 注册按钮点击事件
            registerBtn.addEventListener('click', function() {
                window.location.href = '/register.html';
            });

            // 回车键登录
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loginBtn.click();
                }
            });

            usernameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    passwordInput.focus();
                }
            });

            // 显示消息函数
            function showMessage(message, type) {
                // 移除已存在的消息
                const existingMessage = document.querySelector('.message');
                if (existingMessage) {
                    existingMessage.remove();
                }

                // 创建消息元素
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${type}`;
                messageDiv.textContent = message;

                // 设置样式
                messageDiv.style.cssText = `
                    position: fixed;
                    top: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                    padding: 10px 20px;
                    border-radius: 5px;
                    color: white;
                    font-size: 14px;
                    z-index: 1000;
                    transition: opacity 0.3s ease;
                `;

                if (type === 'success') {
                    messageDiv.style.backgroundColor = '#10b981';
                } else if (type === 'error') {
                    messageDiv.style.backgroundColor = '#ef4444';
                }

                // 添加到页面
                document.body.appendChild(messageDiv);

                // 3秒后自动移除
                setTimeout(() => {
                    messageDiv.style.opacity = '0';
                    setTimeout(() => {
                        if (messageDiv.parentNode) {
                            messageDiv.parentNode.removeChild(messageDiv);
                        }
                    }, 300);
                }, 3000);
            }
        });
    </script>
</body>
</html>
