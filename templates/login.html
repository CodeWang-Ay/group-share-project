<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能计算实验室管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        // 配置Tailwind自定义颜色
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .form-input {
                @apply w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all;
            }
            .btn-primary {
                @apply w-full bg-primary text-white rounded-lg py-3 font-medium hover:bg-primary/90 transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50 relative;
            }
            .btn-loading {
                @apply bg-primary/80 cursor-not-allowed;
            }
            .card-shadow {
                @apply shadow-lg shadow-gray-200/50;
            }
            .loading-spinner {
                @apply inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- 左侧信息面板 -->
        <div class="hidden lg:block relative rounded-xl overflow-hidden h-[500px] card-shadow">
            <div class="absolute inset-0 bg-gradient-to-br from-primary/90 to-primary/70 z-10"></div>
            <img src="https://picsum.photos/id/180/800/1000" alt="实验室研究场景" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 z-20 p-10 flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-3 mb-8">
                        <i class="fa fa-flask text-white text-3xl"></i>
                        <h1 class="text-white text-2xl font-bold">智能计算实验室</h1>
                    </div>
                    <h2 class="text-white text-xl font-semibold mb-3">推动AI研究，培养创新人才</h2>
                    <p class="text-white/90 text-sm leading-relaxed">
                        我们致力于人工智能、机器学习和自然语言处理等前沿领域的研究，
                        为科研人员提供高效的团队协作和项目管理工具。
                    </p>
                </div>
                <div class="text-white/80 text-sm">
                    <p>© 2023 智能计算实验室 版权所有</p>
                </div>
            </div>
        </div>
        
        <!-- 右侧登录面板 -->
        <div class="bg-white rounded-xl p-8 card-shadow flex flex-col">
            <div class="lg:hidden flex items-center gap-3 mb-6">
                <i class="fa fa-flask text-primary text-2xl"></i>
                <h1 class="text-gray-800 text-xl font-bold">智能计算实验室</h1>
            </div>
            
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-1">欢迎回来</h2>
                <p class="text-gray-500">请登录您的账号以继续</p>

                <!-- 预设账号提示 -->
                <div class="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <p class="text-sm text-blue-800">
                        <strong>预设管理员账号：</strong><br>
                        用户名: <code class="bg-blue-100 px-2 py-1 rounded">admin</code><br>
                        密码: <code class="bg-blue-100 px-2 py-1 rounded">admin</code>
                    </p>
                </div>
            </div>
            
            <form class="flex-1">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名/学号/邮箱</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-user text-gray-400"></i>
                        </div>
                        <input type="text" id="username" class="form-input pl-10" placeholder="预设账号: admin">
                    </div>
                </div>
                
                <div class="mb-5">
                    <div class="flex justify-between mb-1">
                        <label for="password" class="block text-sm font-medium text-gray-700">密码</label>
                        <a href="#" class="text-sm text-primary hover:text-primary/80">忘记密码?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="password" class="form-input pl-10" placeholder="预设密码: admin">
                        <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <i class="fa fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                
                  
                <div class="mb-6 flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-primary focus:ring-primary/30 rounded">
                    <label for="remember" class="ml-2 block text-sm text-gray-700">记住我 30 天</label>
                </div>
                
                <button type="submit" class="btn-primary mb-4" id="login-btn">
                    <span id="login-text">登录系统</span>
                    <span id="login-spinner" class="loading-spinner hidden ml-2"></span>
                </button>
                
                <div class="text-center text-sm text-gray-500">
                    <p>还没有账号? <a href="register.html" class="text-primary hover:text-primary/80 font-medium">立即注册</a></p>
                </div>
            </form>
            
            <div class="mt-6 pt-6 border-t border-gray-100">
                <div class="flex flex-col items-center">
                    <p class="text-xs text-gray-500 mb-3">登录即表示您同意我们的</p>
                    <div class="flex gap-4 text-xs">
                        <a href="#" class="text-gray-500 hover:text-primary">用户协议</a>
                        <a href="#" class="text-gray-500 hover:text-primary">隐私政策</a>
                        <a href="#" class="text-gray-500 hover:text-primary">安全说明</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 登录提示框 (默认隐藏) -->
    <div id="login-alert" class="fixed top-4 right-4 bg-white rounded-lg shadow-lg p-4 max-w-xs transform translate-x-full transition-transform duration-300 z-50 border-l-4 border-red-500">
        <div class="flex items-start">
            <div class="flex-shrink-0">
                <i class="fa fa-exclamation-circle text-red-500"></i>
            </div>
            <div class="ml-3">
                <h3 class="text-sm font-medium text-gray-800">登录失败</h3>
                <div class="mt-2 text-sm text-gray-600">
                    <p>用户名或密码不正确，请重新输入。</p>
                </div>
                <div class="mt-3">
                    <button id="close-alert" class="inline-flex items-center px-3 py-1.5 border border-gray-300 shadow-sm text-xs font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                        知道了
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API基础URL - 根据当前环境自动检测
        const API_BASE_URL = window.location.hostname === 'localhost' && (window.location.port === '3000' || window.location.port === '3001')
            ? 'http://localhost:8082'
            : '';

        // 密码显示/隐藏切换
        const passwordToggle = document.querySelector('.fa-eye-slash').parentElement;
        const passwordInput = document.getElementById('password');

        passwordToggle.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // 切换图标
            const icon = this.querySelector('i');
            if (type === 'password') {
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // 登录表单提交处理
        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault();

            // 添加调试信息
            console.log('🔥 登录表单提交事件触发');
            console.log('📍 API_BASE_URL:', API_BASE_URL);
            console.log('📍 当前页面URL:', window.location.href);

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const rememberMe = document.getElementById('remember').checked;

            console.log('📝 表单数据:', { username, password: password ? '***' : '', rememberMe });

            // 简单的前端验证
            if (!username || !password) {
                showAlert('请输入用户名和密码', 'error');
                return;
            }

            // 显示加载状态
            const loginBtn = document.getElementById('login-btn');
            const loginText = document.getElementById('login-text');
            const loginSpinner = document.getElementById('login-spinner');

            loginBtn.disabled = true;
            loginBtn.classList.add('btn-loading');
            loginText.textContent = '登录中';
            loginSpinner.classList.remove('hidden');

            try {
                console.log('🚀 开始发送登录API请求...');
                const apiUrl = `${API_BASE_URL}/api/auth/login`;
                console.log('🌐 请求URL:', apiUrl);

                const requestData = {
                    username: username,
                    password: password,
                    remember_me: rememberMe
                };
                console.log('📤 请求数据:', requestData);

                // 调用登录API
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestData)
                });

                console.log('📥 收到响应，状态码:', response.status);

                const result = await response.json();
                console.log('📋 响应数据:', result);

                if (result.success) {
                    // 登录成功
                    showAlert('登录成功，正在跳转...', 'success');

                    // 存储会话令牌
                    if (result.data.session_token) {
                        // 使用localStorage存储会话信息
                        localStorage.setItem('session_token', result.data.session_token);
                        localStorage.setItem('user_info', JSON.stringify(result.data.user));

                        // 如果选择记住我，设置更长的过期时间
                        if (rememberMe) {
                            localStorage.setItem('remember_me', 'true');
                        }
                    }

                    // 延迟跳转到主页面
                    setTimeout(() => {
                        // 如果是开发环境，跳转到后端主页；如果是生产环境，使用相对路径
                        window.location.href = API_BASE_URL ? `${API_BASE_URL}/` : '/';
                    }, 1000);
                } else {
                    // 登录失败
                    console.log('❌ 登录失败:', result);
                    const errorMessage = result.message || '登录失败，请重试';
                    const errorDetail = result.error || 'UNKNOWN_ERROR';

                    // 显示详细的错误信息
                    showAlert(`${errorMessage} (错误代码: ${errorDetail})`, 'error');

                    // 如果是用户名密码错误，提示使用预设账号
                    if (result.error === 'INVALID_CREDENTIALS') {
                        console.log('💡 提示: 请使用预设管理员账号 admin/admin 登录');
                        setTimeout(() => {
                            showAlert('提示: 请使用预设管理员账号 admin/admin 登录', 'error');
                        }, 2000);
                    }
                }
            } catch (error) {
                console.error('登录错误:', error);
                showAlert('网络错误，请检查网络连接后重试', 'error');
            } finally {
                // 恢复登录按钮
                loginBtn.disabled = false;
                loginBtn.classList.remove('btn-loading');
                loginText.textContent = '登录系统';
                loginSpinner.classList.add('hidden');
            }
        });

        // 显示提示信息
        function showAlert(message, type = 'error') {
            const alert = document.getElementById('login-alert');
            const alertTitle = alert.querySelector('h3');
            const alertMessage = alert.querySelector('p');
            const alertIcon = alert.querySelector('.fa-exclamation-circle, .fa-check-circle');
            const borderColor = alert.querySelector('div[class*="border-"]');

            // 设置内容
            alertMessage.textContent = message;

            if (type === 'success') {
                alertTitle.textContent = '登录成功';
                alertIcon.className = 'fa fa-check-circle text-green-500';
                borderColor.className = 'fixed top-4 right-4 bg-white rounded-lg shadow-lg p-4 max-w-xs transform translate-x-full transition-transform duration-300 z-50 border-l-4 border-green-500';
            } else {
                alertTitle.textContent = '登录失败';
                alertIcon.className = 'fa fa-exclamation-circle text-red-500';
                borderColor.className = 'fixed top-4 right-4 bg-white rounded-lg shadow-lg p-4 max-w-xs transform translate-x-full transition-transform duration-300 z-50 border-l-4 border-red-500';
            }

            // 显示提示
            alert.classList.remove('translate-x-full');

            // 3秒后自动隐藏提示
            setTimeout(() => {
                alert.classList.add('translate-x-full');
            }, 3000);
        }

        // 关闭提示框
        document.getElementById('close-alert').addEventListener('click', function() {
            document.getElementById('login-alert').classList.add('translate-x-full');
        });

  
        // 会话超时警告检查
        let sessionWarningShown = false;
        let sessionCheckInterval;

        function checkSessionStatus() {
            const sessionToken = localStorage.getItem('session_token');
            if (!sessionToken) return;

            fetch(`${API_BASE_URL}/api/auth/session-status`, {
                headers: {
                    'Authorization': `Bearer ${sessionToken}`
                }
            })
            .then(response => response.json())
            .then(result => {
                if (result.success && result.data.authenticated) {
                    // 检查是否有超时警告
                    if (result.data.timeout_warning && !sessionWarningShown) {
                        showSessionWarning(result.data.timeout_warning);
                        sessionWarningShown = true;
                    }
                }
            })
            .catch(() => {
                // 忽略网络错误，避免过多提示
            });
        }

        function showSessionWarning(warning) {
            const warningDiv = document.createElement('div');
            warningDiv.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-yellow-50 border border-yellow-200 rounded-lg shadow-lg p-4 max-w-md z-50';
            warningDiv.innerHTML = `
                <div class="flex items-start">
                    <div class="flex-shrink-0">
                        <i class="fa fa-exclamation-triangle text-yellow-500"></i>
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-yellow-800">会话即将过期</h3>
                        <div class="mt-2 text-sm text-yellow-700">
                            <p>${warning.message}</p>
                        </div>
                        <div class="mt-3 flex gap-2">
                            <button onclick="refreshSession()" class="inline-flex items-center px-3 py-1.5 border border-yellow-300 shadow-sm text-xs font-medium rounded-md text-yellow-800 bg-yellow-50 hover:bg-yellow-100">
                                刷新会话
                            </button>
                            <button onclick="dismissWarning(this)" class="inline-flex items-center px-3 py-1.5 border border-gray-300 shadow-sm text-xs font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                                知道了
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(warningDiv);
        }

        function refreshSession() {
            const sessionToken = localStorage.getItem('session_token');
            if (!sessionToken) return;

            fetch(`${API_BASE_URL}/api/auth/refresh`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${sessionToken}`
                }
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    showAlert('会话已刷新', 'success');
                    sessionWarningShown = false;
                    // 移除警告框
                    const warnings = document.querySelectorAll('[class*="bg-yellow-50"]');
                    warnings.forEach(w => w.remove());
                }
            })
            .catch(() => {
                showAlert('刷新会话失败', 'error');
            });
        }

        function dismissWarning(button) {
            const warningDiv = button.closest('.fixed');
            if (warningDiv) {
                warningDiv.remove();
            }
        }

        // 页面加载时检查是否已登录
        window.addEventListener('load', function() {
            const sessionToken = localStorage.getItem('session_token');
            if (sessionToken) {
                // 验证会话是否仍然有效
                fetch(`${API_BASE_URL}/api/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${sessionToken}`
                    }
                })
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        // 会话有效，直接跳转到主页面
                        // 如果是开发环境，跳转到后端主页；如果是生产环境，跳转到相对路径
                        window.location.href = API_BASE_URL ? `${API_BASE_URL}/` : '/';
                    } else {
                        // 会话无效，清除本地存储
                        localStorage.removeItem('session_token');
                        localStorage.removeItem('user_info');
                        localStorage.removeItem('remember_me');
                    }
                })
                .catch(() => {
                    // 网络错误，清除本地存储
                    localStorage.removeItem('session_token');
                    localStorage.removeItem('user_info');
                    localStorage.removeItem('remember_me');
                });
            }

            // 如果当前页面在登录页面，定期检查会话状态（防止其他标签页操作影响）
            sessionCheckInterval = setInterval(checkSessionStatus, 5 * 60 * 1000); // 每5分钟检查一次
        });

        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', function() {
            if (sessionCheckInterval) {
                clearInterval(sessionCheckInterval);
            }
        });
    </script>
</body>
</html>
